name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64
            binary-name: blueprint.exe

          - os: macos-14
            target: aarch64-apple-darwin
            code-target: darwin-arm64
            binary-name: blueprint

          - os: macos-13
            target: x86_64-apple-darwin
            code-target: darwin-x64
            binary-name: blueprint

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64
            binary-name: blueprint

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64
            binary-name: blueprint
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary-name }} dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.code-target }}
          path: dist/${{ matrix.binary-name }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries into npm packages
        run: |
          for target in win32-x64 darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            mkdir -p npm/${target}/bin
            cp artifacts/binary-${target}/* npm/${target}/bin/
            if [ "$target" != "win32-x64" ]; then
              chmod +x npm/${target}/bin/blueprint
            fi
          done

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set versions in all package.json files
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for target in win32-x64 darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cd npm/${target}
            npm version ${VERSION} --no-git-tag-version --allow-same-version
            cd ../..
          done
          cd npm/blueprint-cli
          npm version ${VERSION} --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../..

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for target in win32-x64 darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "Publishing @irvingouj/blueprint-cli-${target}..."
            cd npm/${target}
            npm publish --access public
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/blueprint-cli
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/binary-*/*
